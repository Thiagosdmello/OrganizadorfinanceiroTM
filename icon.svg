<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2f50"/>
      <stop offset="100%" style="stop-color:#0e1117"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd43b"/>
      <stop offset="100%" style="stop-color:#f59f00"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- fundo arredondado -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- borda sutil -->
  <rect width="512" height="512" rx="112" fill="none" stroke="#4f8ef7" stroke-width="6" stroke-opacity="0.35"/>

  <!-- moeda principal -->
  <circle cx="256" cy="248" r="148" fill="url(#coin)" filter="url(#shadow)"/>

  <!-- anel interno da moeda -->
  <circle cx="256" cy="248" r="120" fill="none" stroke="#f59f00" stroke-width="10"/>

  <!-- brilho da moeda -->
  <ellipse cx="216" cy="200" rx="54" ry="32" fill="url(#shine)" transform="rotate(-30 216 200)"/>

  <!-- símbolo $ -->
  <text x="256" y="284"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="148" font-weight="900"
    text-anchor="middle"
    fill="#1a1200"
    opacity="0.88">$</text>

  <!-- linha vertical do cifrão (parte superior) -->
  <rect x="244" y="118" width="24" height="28" rx="12" fill="#1a1200" opacity="0.88"/>
  <!-- linha vertical do cifrão (parte inferior) -->
  <rect x="244" y="350" width="24" height="28" rx="12" fill="#1a1200" opacity="0.88"/>

  <!-- faixa azul decorativa no canto inferior direito -->
  <rect x="330" y="358" width="110" height="110" rx="28" fill="#4f8ef7" opacity="0.92"/>
  <text x="385" y="432"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="58" font-weight="900"
    text-anchor="middle"
    fill="#ffffff">↗</text>
</svg>
